<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schnittstellen-Entscheidung · SuperOffice Presales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* SuperOffice Brand: Primär #06423e · Sekundär #b2c7eb / #f2efea · Akzent #712f4a / #f48a6d */
    --paper:#F2EFEA; --surface:#FFFFFF; --surface-2:#F7F4EF;
    --ink:#0C2A27; --ink-soft:#3A4B48; --line:#DED7CC;
    --petrol:#06423e; --petrol-dk:#03302C; --petrol-tint:#DCE7E4;
    /* Koralle = REST-Signal (ersetzt Amber) */
    --amber:#C25A3C; --amber-tint:#FBE3DA; --amber-line:#F0B7A4;
    /* Bordeaux = harter Konflikt-Akzent */
    --red:#712f4a; --red-tint:#F3E0E7; --red-line:#D9AEBE;
    --green:#1f7a4d;
    /* Hellblau = informativer Hinweis */
    --info:#3F5C8A; --info-tint:#E3EAF6; --info-line:#B2C7EB;
    --slate:#6A6258;
    --shadow:0 1px 0 rgba(6,66,62,.04), 0 18px 40px -24px rgba(6,66,62,.32);
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"IBM Plex Sans",system-ui,sans-serif;
    background:radial-gradient(120% 80% at 12% -10%, #FBFAF7 0%, transparent 55%), var(--paper);
    color:var(--ink); line-height:1.55; min-height:100vh; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1140px;margin:0 auto;padding:28px 22px 64px;
    display:grid;grid-template-columns:236px 1fr;gap:30px;align-items:start}

  .rail{position:sticky;top:28px}
  .brand{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:18px;
    letter-spacing:-.01em;color:var(--petrol-dk);line-height:1.15;margin-bottom:4px}
  .brand small{display:block;font-family:"IBM Plex Mono",monospace;font-weight:500;
    font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-top:7px}
  .path{margin-top:26px;position:relative}
  .path::before{content:"";position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .pfill{position:absolute;left:10px;top:8px;width:2px;background:var(--petrol);height:0;
    transition:height .5s cubic-bezier(.4,0,.2,1)}
  .pstep{position:relative;display:flex;gap:13px;padding:9px 0;align-items:flex-start}
  .pdot{flex:0 0 22px;height:22px;border-radius:50%;background:var(--surface);
    border:2px solid var(--line);display:grid;place-items:center;
    font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;color:var(--slate);z-index:1;transition:.35s}
  .pstep.active .pdot{border-color:var(--petrol);color:var(--petrol);box-shadow:0 0 0 4px var(--petrol-tint)}
  .pstep.done .pdot{background:var(--petrol);border-color:var(--petrol);color:#fff}
  .pmeta{padding-top:1px}
  .pmeta .k{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--slate)}
  .pmeta .t{font-size:13px;font-weight:600;color:var(--ink-soft);line-height:1.25}
  .pstep.active .pmeta .t,.pstep.done .pmeta .t{color:var(--ink)}
  .railnote{margin-top:22px;font-size:11.5px;color:var(--slate);border-top:1px solid var(--line);padding-top:14px}

  .stage{min-height:60vh}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:34px 36px;animation:rise .42s cubic-bezier(.2,.7,.3,1)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--petrol);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--petrol)}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:30px;letter-spacing:-.02em;line-height:1.12;margin-bottom:12px}
  .q{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:23px;letter-spacing:-.015em;line-height:1.22;margin-bottom:6px}
  .lead{font-size:15px;color:var(--ink-soft);max-width:54ch}
  .hint{font-size:13px;color:var(--slate);margin-top:9px;max-width:58ch}
  .multi-tag{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--slate);background:var(--surface-2);border:1px solid var(--line);
    border-radius:20px;padding:3px 11px;margin-top:14px}

  .opts{margin-top:22px;display:grid;gap:11px}
  .opt{display:flex;gap:15px;align-items:flex-start;text-align:left;width:100%;cursor:pointer;
    background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;font:inherit;color:inherit;transition:.16s}
  .opt:hover{border-color:var(--petrol);background:var(--surface-2)}
  .opt:focus-visible{outline:3px solid var(--petrol-tint);outline-offset:2px}
  .opt.sel{border-color:var(--petrol);background:var(--petrol-tint)}
  .opt .box{flex:0 0 20px;height:20px;border-radius:6px;border:2px solid var(--line);margin-top:2px;
    display:grid;place-items:center;transition:.16s}
  .opt.radio .box{border-radius:50%}
  .opt.sel .box{background:var(--petrol);border-color:var(--petrol)}
  .opt .box svg{width:12px;height:12px;opacity:0;transition:.16s}
  .opt.sel .box svg{opacity:1}
  .opt .opttext{display:flex;flex-direction:column;gap:3px;min-width:0}
  .opt .ot{display:block;font-weight:600;font-size:15.5px;letter-spacing:-.005em;line-height:1.3}
  .opt .od{display:block;font-size:13px;color:var(--ink-soft);line-height:1.45}
  .opt .pill{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 8px;border-radius:5px;margin-left:8px;vertical-align:middle;white-space:nowrap}
  .pill-rest{background:var(--amber-tint);color:var(--amber)}
  .pill-tier{background:var(--petrol-tint);color:var(--petrol-dk)}
  .pill-mod{background:var(--info-tint);color:var(--info)}
  .pill-ext{background:var(--info-tint);color:var(--info)}

  /* Externe „Individuell"-Karte */
  .opt.tier-ext{border-style:dashed;border-color:var(--info-line)}
  .opt.tier-ext:hover{border-color:var(--info);background:var(--info-tint)}
  .opt.tier-ext.sel{border-style:solid;border-color:var(--info);background:var(--info-tint)}
  .opt.tier-ext.sel .box{background:var(--info);border-color:var(--info)}
  .ext-hint{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-family:"IBM Plex Mono",monospace;
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--info);font-weight:600}

  /* tier cards */
  .tierbody{flex:1}
  .tierhead{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .meta{display:block;font-size:13px;color:var(--ink-soft);margin-top:7px;line-height:1.45}
  .meta b{color:var(--ink);font-weight:600}
  .incl{display:flex;gap:18px;margin-top:11px;flex-wrap:wrap}
  .incl .col{flex:1 1 200px;font-size:12.5px;line-height:1.4}
  .incl .lbl{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px}
  .incl .yes .lbl{color:var(--green)} .incl .no .lbl{color:var(--slate)}
  .incl .yes{color:var(--ink-soft)} .incl .no{color:var(--slate)}
  .warn-inline{display:block;margin-top:7px;font-size:12px;color:var(--amber);background:var(--amber-tint);
    border-radius:7px;padding:6px 10px;line-height:1.4}

  /* Inline-Plausibilitäts-Hinweise direkt im Schritt */
  .inline-flag{display:flex;gap:11px;align-items:flex-start;border-radius:11px;padding:13px 16px;margin-top:16px;
    font-size:13px;line-height:1.5;animation:rise .3s cubic-bezier(.2,.7,.3,1)}
  .inline-flag.req{background:var(--red-tint);border:1px solid var(--red-line);color:var(--red)}
  .inline-flag.soft{background:var(--amber-tint);border:1px solid var(--amber-line);color:#8A3A22}
  .inline-flag .ic{flex:0 0 18px;font-weight:700;font-family:"Space Grotesk",sans-serif;margin-top:1px}
  .inline-flag b{font-weight:600}
  .nav .reqhint{font-size:12.5px;color:var(--red);font-weight:500;display:flex;align-items:center;gap:6px;margin-right:4px}
  .nav .reqhint .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--red);
    animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1)}}

  .nav{display:flex;gap:12px;margin-top:28px;align-items:center;flex-wrap:wrap}
  .btn{font:inherit;font-weight:600;font-size:14.5px;border-radius:10px;padding:12px 24px;cursor:pointer;
    border:1.5px solid transparent;transition:.16s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--petrol);color:#fff}
  .btn-primary:hover{background:var(--petrol-dk)}
  .btn-primary:disabled{background:var(--line);color:var(--slate);cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink-soft);border-color:var(--line)}
  .btn-ghost:hover{border-color:var(--petrol);color:var(--petrol)}
  .btn:focus-visible{outline:3px solid var(--petrol-tint);outline-offset:2px}
  .spacer{flex:1}
  .stepcount{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--slate);letter-spacing:.08em}

  .res-head{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  .badge{border-radius:11px;padding:14px 18px;flex:1 1 200px;border:1.5px solid var(--line)}
  .badge .bk{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .badge .bv{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:20px;letter-spacing:-.01em;line-height:1.12}
  .badge.pkg{background:var(--petrol);border-color:var(--petrol)}
  .badge.pkg .bk{color:#9CC9C4}.badge.pkg .bv{color:#fff}.badge.pkg .bt{color:#CFE6E3;font-size:12.5px;margin-top:4px}
  .badge.tech-db{background:var(--surface-2)} .badge.tech-db .bv{color:var(--slate)}
  .badge.tech-rest{background:var(--amber-tint);border-color:var(--amber-line)}.badge.tech-rest .bv{color:var(--amber)}
  .badge.tech-hybrid{background:linear-gradient(100deg,var(--surface-2) 0 50%,var(--amber-tint) 50% 100%)}
  .badge.tech-hybrid .bv{color:var(--petrol-dk)}
  .badge .bt{font-size:12.5px;color:var(--ink-soft);margin-top:5px;font-weight:400;line-height:1.4}
  .modtags{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}
  .modtag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;background:var(--info-tint);
    color:var(--info);border-radius:6px;padding:4px 10px}

  .block{margin-top:22px}
  .block h3{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--petrol);font-weight:600;margin-bottom:11px}
  .strecke{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .strecke:last-child{border-bottom:none}
  .dir{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;color:#fff;background:var(--slate);padding:3px 8px;border-radius:5px;white-space:nowrap}
  .dir.rest{background:var(--amber)}
  .arg{display:flex;gap:11px;padding:7px 0;font-size:14px;color:var(--ink-soft)}
  .arg::before{content:"";flex:0 0 7px;height:7px;border-radius:50%;background:var(--petrol);margin-top:8px}
  .cost{background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:16px 18px;font-size:13.5px;color:var(--ink-soft)}
  .cost b{color:var(--ink)}
  .eff{margin-top:2px}
  .effrow{display:grid;grid-template-columns:184px 116px 1fr;gap:16px;align-items:baseline;padding:12px 0;border-bottom:1px dashed var(--line)}
  .effrow:last-child{border-bottom:none}
  .effp{font-weight:600;font-size:14px}
  .effv{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:18px;color:var(--petrol-dk);white-space:nowrap}
  .effd{font-size:12.5px;color:var(--slate);line-height:1.45}
  .effnote{font-size:12px;color:var(--slate);font-style:italic;margin-top:12px}
  .warn{display:flex;gap:13px;border-radius:11px;padding:15px 18px;margin-top:14px;font-size:13.5px;line-height:1.5}
  .warn.red{background:var(--red-tint);border:1px solid var(--red-line);color:var(--red)}
  .warn.amber{background:var(--amber-tint);border:1px solid var(--amber-line);color:#8A3A22}
  .warn.info{background:var(--info-tint);border:1px solid var(--info-line);color:var(--info)}
  .warn .ic{flex:0 0 18px;font-weight:700;font-family:"Space Grotesk",sans-serif}
  .warn b{font-weight:600}
  .dead{text-align:center;padding:26px 10px}
  .dead .big{font-family:"Space Grotesk",sans-serif;font-size:46px;color:var(--red);font-weight:700}

  /* Exit-Overlay (Weiterleitung zum externen Calculator) */
  .exit-ov{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:22px;
    background:rgba(6,66,62,.34);backdrop-filter:blur(3px);opacity:0;transition:opacity .22s}
  .exit-ov.show{opacity:1}
  .exit-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:0 30px 70px -28px rgba(6,66,62,.55);max-width:480px;width:100%;padding:32px 34px;
    transform:translateY(12px) scale(.98);transition:transform .24s cubic-bezier(.2,.7,.3,1)}
  .exit-ov.show .exit-card{transform:none}
  .exit-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
    background:var(--info-tint);color:var(--info);font-size:24px;font-weight:700;margin-bottom:16px}
  .exit-eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--info);font-weight:600;margin-bottom:8px}
  .exit-card h2{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:23px;
    letter-spacing:-.015em;line-height:1.2;margin-bottom:11px}
  .exit-card p{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px}
  .exit-url{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--slate);
    background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;
    word-break:break-all;margin-bottom:4px}
  .exit-nav{display:flex;gap:11px;margin-top:20px;justify-content:flex-end;align-items:center}
  .exit-nav .btn{text-decoration:none}

  /* Ergebnis-Toolbar & Modus-Schalter */
  .resbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
    margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .modeswitch{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .modeswitch .ms{font:inherit;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--ink-soft);
    padding:7px 15px;border-radius:7px;cursor:pointer;transition:.16s}
  .modeswitch .ms.on{background:var(--petrol);color:#fff}
  .modeswitch .ms:not(.on):hover{color:var(--petrol)}
  .resactions{display:flex;gap:8px;flex-wrap:wrap}
  .btn-sm{font:inherit;font-size:12.5px;font-weight:600;border:1.5px solid var(--line);background:var(--surface);
    color:var(--ink-soft);border-radius:8px;padding:7px 13px;cursor:pointer;transition:.16s}
  .btn-sm:hover{border-color:var(--petrol);color:var(--petrol)}
  .kbanner{background:var(--petrol);color:#fff;border-radius:10px;padding:10px 15px;font-size:12.5px;
    font-weight:500;margin-bottom:18px;letter-spacing:.01em}

  /* Upgrade-Treppe */
  .stairs{display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap}
  .stair{flex:1 1 0;min-width:96px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;
    padding:14px 13px;text-align:center;transition:.18s}
  .stair.past{opacity:.6}
  .stair.current{background:var(--petrol);border-color:var(--petrol);transform:translateY(-4px);
    box-shadow:0 12px 26px -16px rgba(6,66,62,.6)}
  .stair.current .stair-name,.stair.current .stair-sub{color:#fff}
  .stair.current .stair-dot{background:#fff;color:var(--petrol)}
  .stair.future{border-style:dashed;border-color:var(--info-line)}
  .stair-dot{width:26px;height:26px;border-radius:50%;background:var(--petrol-tint);color:var(--petrol-dk);
    display:grid;place-items:center;margin:0 auto 8px;font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:12px}
  .stair-name{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;color:var(--ink)}
  .stair-sub{font-size:11px;color:var(--slate);margin-top:3px;line-height:1.3}
  .stair-arrow{align-self:center;color:var(--slate);font-size:18px;flex:0 0 auto;padding-bottom:14px}
  .stairs-note{font-size:13px;color:var(--ink-soft);margin-top:12px}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);z-index:60;
    background:var(--petrol-dk);color:#fff;font-size:13.5px;padding:12px 20px;border-radius:10px;
    box-shadow:0 18px 40px -18px rgba(6,66,62,.6);opacity:0;pointer-events:none;transition:.24s;max-width:90vw;word-break:break-all}
  .toast.show{opacity:1;transform:translateX(-50%)}

  @media print{
    .rail,.no-print,.nav,.toast,.exit-ov{display:none!important}
    .wrap{display:block;max-width:100%;padding:0}
    body{background:#fff}
    .card{box-shadow:none;border:none;padding:0;animation:none}
    .stair.current{box-shadow:none;transform:none}
    .block{break-inside:avoid}
  }

  @media(max-width:860px){
    .wrap{grid-template-columns:1fr;gap:18px;padding:18px 15px 50px}
    .rail{position:static}
    .path{display:flex;gap:4px;margin-top:16px;overflow-x:auto;padding-bottom:4px}
    .path::before,.pfill{display:none}
    .pstep{flex-direction:column;align-items:center;text-align:center;gap:6px;min-width:74px;padding:0}
    .pmeta .t{font-size:11px}.railnote{display:none}
    .card{padding:24px 20px}h1{font-size:24px}.q{font-size:20px}
    .effrow{grid-template-columns:1fr auto;gap:4px 12px}.effd{grid-column:1/-1;order:3}
    .incl{flex-direction:column;gap:8px}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <aside class="rail">
    <div class="brand">Schnittstellen-Entscheidung<small>SuperOffice · Presales</small></div>
    <nav class="path" id="path"><div class="pfill" id="pfill"></div></nav>
    <p class="railnote">Eine Treppenstufe wählen, Module andocken. Der Kunde beschreibt seinen Prozess — das Werkzeug leitet Paket, Technologie und Aufwand ab.</p>
  </aside>
  <main class="stage" id="stage"></main>
</div>

<script>
const CHECK='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const ARROW='<svg viewBox="0 0 24 24" width="17" height="17" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

const LAYERS=[{k:'00',t:'Qualifizierung'},{k:'01',t:'Paket & Module'},{k:'02',t:'Komplexität'},{k:'→',t:'Empfehlung'}];

// Strecken-Katalog (us = unser Aufwand PT Basis/DataBridge; db/rest = ERP-Entwickler [von,bis]; db:null = nur REST)
const ST={
  firma:        {n:'Firma',                         dir:'ERP→SO', us:1.0, db:[0.5,1],  rest:[1.5,2.5]},
  erstanlage:   {n:'Erstanlage Interessent',        dir:'SO→ERP', us:1.5, db:[1,2],    rest:[2,3]},
  angebotskopf: {n:'Angebotskopf → Verkaufschance',  dir:'ERP→SO', us:1.5, db:[1,1.5],  rest:[2,3]},
  nachfass:     {n:'Nachfassaktivität',              dir:'SO',     us:0.5, db:[0,0],    rest:[0,0]},
  positionen:   {n:'Angebotspositionen (Varianten)', dir:'ERP→SO', us:3.0, db:null,     rest:[3,5]},

function buildPath(){const p=document.getElementById('path');
  LAYERS.forEach((l,i)=>{const el=document.createElement('div');el.className='pstep';el.id='pl'+i;
    el.innerHTML=`<div class="pdot">${l.k}</div><div class="pmeta"><div class="k">Schicht ${l.k}</div><div class="t">${l.t}</div></div>`;p.appendChild(el);});}
function updatePath(){const cur=layerForStep[STEPS[state.step]];
  LAYERS.forEach((_,i)=>{const el=document.getElementById('pl'+i);el.className='pstep';
    if(i<cur)el.classList.add('done');if(i===cur)el.classList.add('active');});
  const frac=cur<0?0:Math.min(cur/(LAYERS.length-1),1);
  document.getElementById('pfill').style.height=`calc((100% - 16px) * ${frac})`;}

function render(){updatePath();const s=STEPS[state.step];

/* ---------- compute ---------- */
// Liefert eine weiche Inline-Warnung, wenn die bisherige Auswahl REST erzwingt,
// der Kunde aber (laut Schicht 00) nicht REST-fähig ist. Gibt '' zurück, wenn kein Konflikt.
function restConflictNote(){
  if(state.restCapable!==false) return '';
  const reasons=[];
  if(state.tier==='pro') reasons.push('Pro (Angebotspositionen mit Varianten)');
  if(state.modules.has('customRest')) reasons.push('Zusatztabellen mit Sonderlogik');
  if(state.persons==='bidi') reasons.push('bidirektionale Personen-Synchronisation');
  [...state.flags].filter(x=>x!=='__none').forEach(id=>{const f=FLAGS.find(x=>x.id===id);if(f)reasons.push(f.t);});
  if(!reasons.length) return '';
  return `<div class="inline-flag soft"><span class="ic">!</span><div><b>Hinweis:</b> Die Auswahl <b>${reasons.join(', ')}</b> erfordert einen REST-Endpunkt — der Kunde ist laut Schicht 00 aber nicht REST-fähig. Du kannst fortfahren; das Ergebnis zeigt dann den Konflikt und die Optionen (Umfang reduzieren oder ERP REST-fähig machen).</div></div>`;}

function buildStrecken(){
  const L=[ST.firma,ST.erstanlage];
  if(state.tier==='plus'||state.tier==='pro'){L.push(ST.angebotskopf,ST.nachfass);}
  if(state.tier==='pro'){L.push(ST.positionen,ST.artikel);}
  if(state.modules.has('insightKonto'))L.push(ST.insightKonto);
  if(state.modules.has('insightBelege'))L.push(ST.insightBelege);
  if(state.persons==='erp2so')L.push(ST.personErp);
  if(state.persons==='so2erp')L.push(ST.personSo);
  if(state.persons==='bidi')L.push(ST.personBidi);
  if(state.modules.has('custom'))L.push(ST.custom);
  if(state.modules.has('customRest'))L.push(ST.customRest);
  return L;}
function workshopHours(){let h=4; // Entry: Firmen-Round-Trip
  if(state.tier==='plus'||state.tier==='pro')h+=2;
  if(state.tier==='pro')h+=4;
  if(state.modules.has('insightKonto'))h+=2;
  if(state.modules.has('insightBelege'))h+=2;
  if(state.persons==='erp2so'||state.persons==='so2erp')h+=2;
  if(state.persons==='bidi')h+=4;
  if(state.modules.has('custom'))h+=2;
  if(state.modules.has('customRest'))h+=2;return h;}

function computeResult(){
  if(state.restCapable===false&&state.fileCapable===false)return{dead:true};
  const tierName={entry:'Entry',plus:'Plus',pro:'Pro'}[state.tier];
  const tier=TIERS.find(t=>t.id===state.tier);
  const mods=[];
  if(state.modules.has('insightKonto'))mods.push('Insight Konto');
  if(state.modules.has('insightBelege'))mods.push('Insight Belege');
  if(state.persons&&state.persons!=='none')mods.push('Personen');
  if(state.modules.has('custom'))mods.push('Zusatztabellen');
  if(state.modules.has('customRest'))mods.push('Zusatztabellen+');
  const pkg=tierName+(mods.length?' + '+mods.join(' + '):'');

  const flagSet=[...state.flags].filter(x=>x!=='__none');
  const restForced=state.tier==='pro'||state.modules.has('customRest')||state.persons==='bidi'||flagSet.length>0;
  const reasons=[];
  if(state.tier==='pro')reasons.push('Angebotspositionen mit Varianten/Versionen');
  if(state.modules.has('customRest'))reasons.push('Zusatztabellen mit Sonderlogik (synchron/Zielfeld/Merge)');
  if(state.persons==='bidi')reasons.push('bidirektionale Personen-Synchronisation mit Konfliktauflösung');
  flagSet.forEach(id=>{const f=FLAGS.find(x=>x.id===id);if(f)reasons.push(f.reason);});

  const tech=restForced?'REST':'DataBridge';
  const hybrid=state.migration===true&&tech==='REST';
  const conflict=restForced&&state.restCapable===false;
  return{dead:false,pkg,tier,tagline:tier.tagline,mods,tech,hybrid,conflict,reasons:[...new Set(reasons)],flagSet,restForced};}

function computeEffort(strecken){
  const r05=x=>Math.round(x*2)/2;const restTech=(computeResult().tech==='REST'||computeResult().hybrid);
  let usPoint=0,goLive=0,erpLo=0,erpHi=0,hasErp=false;
  strecken.forEach(s=>{const inherent=(s.db===null);
    usPoint+=s.us*((restTech&&!inherent)?1.5:1);
    if(s.dir!=='SO'){goLive+=0.5;const band=restTech?s.rest:(s.db||s.rest);erpLo+=band[0];erpHi+=band[1];if(band[1]>0)hasErp=true;}});
  let setupLo=1,setupHi=2,authLo=0,authHi=0,migLo=0,migHi=0;
  if(restTech){authLo=1;authHi=2;}if(state.migration===true){migLo=1;migHi=2;}
  const usLo=r05(usPoint*0.9+goLive+setupLo+authLo+migLo);
  const usHi=r05(usPoint*1.1+goLive+setupHi+authHi+migHi);
  if(restTech){erpLo+=1;erpHi+=2;}if(state.migration===true){erpLo+=1;erpHi+=2;}
  return{usLo,usHi,wsHours:workshopHours(),erpLo:r05(erpLo),erpHi:r05(erpHi),hasErp,restTech};}

/* ---------- Ergebnis-Darstellung ---------- */
// Kundentaugliche Outcome-Sätze je Strecken-Schlüssel (intern -> Kundensprache)
const OUTCOME={
  firma:'Ihre Kundenstammdaten sind in CRM und ERP automatisch aktuell — ohne doppelte Pflege.',
  erstanlage:'Neue Interessenten aus dem CRM stehen sofort kaufmännisch im ERP bereit.',
  angebotskopf:'Jedes ERP-Angebot erscheint automatisch als Verkaufschance in Ihrer Pipeline.',
  nachfass:'Ihr Vertrieb wird aktiv ans Nachfassen erinnert — keine Chance versandet.',
  positionen:'Komplette Angebote inkl. aller Positionen und Varianten sind im CRM auswertbar.',
  artikel:'Ihre Artikel erscheinen mit Namen statt Codes — direkt verständlich.',
  insightKonto:'Ihr Außendienst sieht Umsatz und Zahlungsverhalten direkt am Unternehmen.',
  insightBelege:'Innendienst und Service sehen den Status laufender Vorgänge auf einen Blick.',
  personErp:'Im ERP gepflegte Ansprechpartner werden im CRM sichtbar.',
  personSo:'CRM-Ansprechpartner stehen Ihren ERP-Prozessen zur Verfügung.',
  personBidi:'Ansprechpartner bleiben auf beiden Seiten konsistent gepflegt.',
  custom:'Ihre zusätzlichen Daten (z. B. Verträge oder Geräte) erscheinen automatisch im CRM.',
  customRest:'Ihre individuellen Datenprozesse laufen in Echtzeit und regelbasiert.',
};
function outcomeFor(streckeObj){
  const key=Object.keys(ST).find(k=>ST[k]===streckeObj);
  return OUTCOME[key]||streckeObj.n;}

// Visuelle Upgrade-Treppe (Entry -> Plus -> Pro), gewählte Stufe hervorgehoben
function upgradeStairs(forCustomer){
  if(!['entry','plus','pro'].includes(state.tier))return '';
  const order=['entry','plus','pro'];
  const cur=order.indexOf(state.tier);
  const labels={entry:'Entry',plus:'Plus',pro:'Pro'};
  const next={entry:'+ Angebotskopf & Pipeline',plus:'+ vollständige Angebote',pro:''};
  const custNext={entry:'Mehr Pipeline-Automatik möglich',plus:'Komplette Angebotsübernahme möglich',pro:'Höchste Ausbaustufe erreicht'};
  const steps=order.map((id,i)=>{
    const cls=i<cur?'past':(i===cur?'current':'future');
    const sub=i===cur?(forCustomer?'Ihre Wahl':'aktuell'):(i>cur?(forCustomer?'Ausbaustufe':next[order[i-1]]||''):'');
    return `<div class="stair ${cls}"><div class="stair-dot">${i+1}</div><div class="stair-name">${labels[id]}</div>${sub?`<div class="stair-sub">${sub}</div>`:''}</div>`;
  }).join('<div class="stair-arrow">→</div>');
  const note=forCustomer
    ? `<p class="stairs-note">${custNext[state.tier]}${state.tier!=='pro'?' — jederzeit zubuchbar, ohne neues Projekt.':'.'}</p>`
    : (state.tier!=='pro'?`<p class="stairs-note">Upsell-Pfad offen: nächste Stufe ist „${labels[order[cur+1]]}“.</p>`:'');
  return `<div class="block"><h3>${forCustomer?'Ihr Ausbaupfad':'Upgrade-Pfad'}</h3>
    <div class="stairs">${steps}</div>${note}</div>`;}

// Aktionsleiste + Modus-Schalter (oben auf der Ergebnisseite)
function resultToolbar(){
  const isK=state.viewMode==='kunde';
  return `<div class="resbar no-print">
    <div class="modeswitch" role="tablist" aria-label="Ansicht wählen">
      <button class="ms ${!isK?'on':''}" id="mode-intern" role="tab" aria-selected="${!isK}">Interne Sicht</button>
      <button class="ms ${isK?'on':''}" id="mode-kunde" role="tab" aria-selected="${isK}">Kundensicht</button>
    </div>
    <div class="resactions">
      <button class="btn-sm" id="act-copy">Link kopieren</button>
      <button class="btn-sm" id="act-save">Speichern</button>
      <button class="btn-sm" id="act-print">PDF / Drucken</button>
    </div>
  </div>`;}

function renderResult(){
  const r=computeResult();
  if(r.dead){
    shell('Schicht 00 · Ergebnis',`
      <div class="dead"><div class="big">—</div>
        <div class="q" style="margin-top:8px">Keine automatisierte Schnittstelle möglich</div>
        <p class="lead" style="margin:10px auto 0">Das ERP kann weder einen REST-Endpunkt ansprechen noch Dateien über SFTP/SharePoint austauschen. Ohne Andockpunkt bleibt nur ein manueller Prozess oder eine vorgelagerte Projektklärung mit der Kunden-IT.</p></div>
      <div class="warn amber"><span class="ic">!</span><div><b>Nächster Schritt:</b> Mit der Kunden-IT klären, ob das ERP nachrüstbar ist (API-Modul, Export-Automatik). Erst danach lässt sich ein Paket anbieten.</div></div>
      ${nav(2,null,false,false)}`);
    wireBack(2);addRestart();return;}

  const techClass=r.hybrid?'tech-hybrid':(r.tech==='REST'?'tech-rest':'tech-db');
  const techLabel=r.hybrid?'Hybrid':r.tech;
  let techReason=r.hybrid?'Breite Erstmigration per DataBridge, laufende Strecken per REST.'
    :(r.tech==='REST'?'Erfordert durch: '+r.reasons.join('; ')+'.'
    :'Kein Bedarf an Synchronität oder Zielfeld-Logik — DataBridge ist günstiger und reifer.');

  const strecken=buildStrecken();
  const streckenHTML=strecken.map(s=>{
    const isRest=(r.tech==='REST'||r.hybrid)&&s.dir!=='SO';
    return `<div class="strecke"><span class="dir ${isRest?'rest':''}">${s.dir}</span><span>${s.n}</span></div>`;}).join('');

  const eff=computeEffort(strecken);
  const fmt=x=>Number.isInteger(x)?x:x.toFixed(1).replace('.',',');
  const erpLabel=r.hybrid?'Hybrid · Bulk-Export + REST-Endpunkt':(r.tech==='REST'?'REST-Endpunkt bereitstellen':'dateibasierter Export (DataBridge)');
  const effortHTML=`<div class="block"><h3>Grobe Aufwandsschätzung</h3><div class="eff">
      <div class="effrow"><div class="effp">Wir · SuperOffice</div><div class="effv">${fmt(eff.usLo)}–${fmt(eff.usHi)} PT</div>
        <div class="effd">Konfiguration, Feld-Mapping, Setup${eff.restTech?', REST-Entwicklung & Auth':''}, Test &amp; Go-live${state.migration===true?', Migrations-Support':''}.</div></div>
      <div class="effrow"><div class="effp">Kunde · Workshop</div><div class="effv">ca. ${eff.wsHours} h</div>
        <div class="effd">Spezifikationsworkshop: Feld-Mapping, Transformationen, Code-Tabellen. 2 h je Entität/Richtung, 4 h bei Bidirektionalität. Projektleitung übernehmen wir.</div></div>
      ${eff.hasErp?`<div class="effrow"><div class="effp">ERP-Entwickler · Kunde/Partner</div><div class="effv">${fmt(eff.erpLo)}–${fmt(eff.erpHi)} PT</div>
        <div class="effd">${erpLabel}${state.migration===true?' · inkl. Erstmigrations-Export':''}. Liegt außerhalb unseres Liefergegenstands.</div></div>`:''}
    </div><p class="effnote">Grobe Orientierung für die Angebotsphase — keine Detailschätzung. PT = Personentage.</p></div>`;

  let cost;
  if(r.hybrid)cost=`<b>Hybrid.</b> Erstmigration über DataBridge (~150 €/Mt Standard bzw. ~230 € Professional). Laufende REST-Strecken: Implementierung ×1,5 + ~80 €/Mt Lizenz. <b>Wiederkehrende Ops-/Wartungs-Pauschale für REST separat einpreisen</b> (Monitoring, Retry, ERP-API-Bruchrisiko).`;
  else if(r.tech==='REST')cost=`Implementierung ~1,5× je Strecke. ~80 €/Mt Lizenz. <b>Wiederkehrende Ops-/Wartungs-Pauschale separat einpreisen</b> — Hebel gegen die Margenfalle und euer Recurring Revenue.`;
  else cost=`Implementierung ~1 Tag je Strecke. Lizenz ~150 €/Mt (bis 50k DS) bzw. ~230 €/Mt Professional (bis 150k). Out-of-Box-Monitoring inklusive.`;

  const args=[];
  if(state.tier==='entry'&&!r.flagSet.length)args.push('Positionierung: „Unser Entry-Level — besonders günstig, easy zum Starten.“ Der Upgrade-Pfad auf Plus/Pro bleibt offen.');
  args.push('Self-Healing: Fällt ein Schlüssel-Rücklauf aus, trägt die Firmen-Gegenstrecke ihn beim nächsten Lauf automatisch nach.');
  if(state.tier==='plus'||state.tier==='pro')args.push('Nachfass macht aus Sichtbarkeit Handlung — als konfigurierbare Regel mit Zuweisung/Dedup ausliefern, sonst kippt sie in Spam und wird abgeschaltet.');
  if(state.tier==='pro')args.push('Angebotspositionen mit Varianten sind strukturell zu komplex für DataBridge — REST ist hier kein Aufpreis, sondern Voraussetzung.');
  if(state.modules.has('insightKonto'))args.push('Insight Konto ist im Verkauf oft das wertvollste Modul: Der Außendienst sieht „guter Zahler / Umsatz X“ direkt am Unternehmen. Klar abgrenzen gegen Beleg-Status.');
  if(state.modules.has('insightBelege'))args.push('Insight Belege bedient den Innendienst/Service — höhere Frequenz als die Konto-KPIs, deshalb eigenes Modul.');
  if(r.tech==='REST'&&!r.hybrid)args.push('REST liefert synchron, in Echtzeit und mit Zielfeld-Logik — Fähigkeiten, die DataBridge gar nicht hat. Als Capability-Premium bepreisen, nicht als Aufschlag.');
  if(r.tech==='DataBridge')args.push('DataBridge braucht keinen Code, bringt Monitoring/Alerting mit und hält die Implementierung günstig — ideal für den preissensiblen Einstieg.');

  const modtags=r.mods.length?`<div class="modtags">${r.mods.map(m=>`<span class="modtag">+ ${m}</span>`).join('')}</div>`:'';

  // --- Kundensicht: nur Outcomes, kein PT/Marge/Konflikt ---
  if(state.viewMode==='kunde'){
    const techTrust=r.hybrid
      ? 'Bewährte Standard-Middleware für den Datenaustausch, kombiniert mit einer individuell entwickelten Echtzeit-Schnittstelle.'
      : (r.tech==='REST'
        ? 'Eine individuell für Sie entwickelte Echtzeit-Schnittstelle — direkt in Ihrer SuperOffice-Cloud.'
        : 'Über eine bewährte, wartungsarme Standard-Middleware — robust und schnell startklar.');
    const outcomes=strecken.map(s=>`<div class="arg">${outcomeFor(s)}</div>`);
    const uniqueOut=[...new Set(outcomes)];
    shell('Ihr Integrationspaket',`
      ${resultToolbar()}
      <div class="kbanner no-print">Kundensicht — projizierbar im Termin. Keine internen Zahlen sichtbar.</div>
      <div class="res-head">
        <div class="badge pkg"><div class="bk">Ihr Paket</div><div class="bv">${r.pkg}</div><div class="bt">${r.tagline}</div></div>
      </div>${modtags}
      <div class="block"><h3>Was Sie konkret gewinnen</h3>${uniqueOut.join('')}</div>
      ${upgradeStairs(true)}
      <div class="block"><h3>Wie es umgesetzt wird</h3><div class="cost">${techTrust}</div></div>
      <p class="effnote">Unverbindliche Orientierung. Eine verbindliche Spezifikation erfolgt im gemeinsamen Workshop.</p>
      ${nav(7,null,false,false)}`);
    wireResultActions();wireBack(7);addRestart();return;}

  // --- Interne Sicht (Default): volle Schätzung ---
  shell('Schicht → · Empfehlung',`
    ${resultToolbar()}
    <div class="res-head">
      <div class="badge pkg"><div class="bk">Empfohlenes Paket</div><div class="bv">${r.pkg}</div><div class="bt">${r.tagline}</div></div>
      <div class="badge ${techClass}"><div class="bk">Technologie</div><div class="bv">${techLabel}</div><div class="bt">${techReason}</div></div>
    </div>${modtags}
    ${r.conflict?`<div class="warn red"><span class="ic">!</span><div><b>Konflikt:</b> Der gewählte Umfang erfordert REST, aber der Kunde kann keinen REST-Endpunkt ansprechen/empfangen. Optionen: Umfang reduzieren (Pro/Positionen, Zusatztabellen mit Sonderlogik, bidirektionale Personen oder Synchronität streichen → DataBridge) <b>oder</b> ERP-seitig die REST-Voraussetzung schaffen.</div></div>`:''}
    ${state.persons==='bidi'?`<div class="warn amber"><span class="ic">!</span><div><b>Personen bidirektional:</b> Selten wirklich nötig. Prüfe, ob ERP→SO oder SO→ERP reicht. Sonst Master-Regel pro Feld und Dubletten-Logik fest einplanen.</div></div>`:''}
    ${upgradeStairs(false)}
    <div class="block"><h3>Enthaltene Strecken</h3>${streckenHTML}</div>
    ${effortHTML}
    <div class="block"><h3>Kostentreiber</h3><div class="cost">${cost}</div></div>
    <div class="block"><h3>Argumente fürs Gespräch</h3>${args.map(a=>`<div class="arg">${a}</div>`).join('')}</div>
    ${r.tech==='DataBridge'&&state.restCapable?`<div class="warn info"><span class="ic">i</span><div>Der Kunde ist REST-fähig, der Umfang verlangt es aber nicht. Bewusst DataBridge wählen hält den Preis niedrig — REST bleibt als Ausbaustufe im Köcher.</div></div>`:''}
    ${nav(7,null,false,false)}`);
  wireResultActions();wireBack(7);addRestart();}

// Verdrahtet Modus-Schalter und Aktionsbuttons der Ergebnisseite
function wireResultActions(){
  const mi=document.getElementById('mode-intern'),mk=document.getElementById('mode-kunde');
  if(mi)mi.onclick=()=>{state.viewMode='intern';render();};
  if(mk)mk.onclick=()=>{state.viewMode='kunde';render();};
  const copy=document.getElementById('act-copy');
  if(copy)copy.onclick=()=>{const link=permalink();
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(link).then(()=>toast('Link kopiert — direkt teilbar.'),()=>toast(link));}
    else toast(link);};
  const save=document.getElementById('act-save');
  if(save)save.onclick=()=>{const name=prompt('Kalkulation speichern unter (z. B. Kundenname):','');
    if(name===null)return;saveConfig(name)?toast('Lokal gespeichert.'):toast('Speichern nicht möglich (Browser blockiert localStorage).');};
  const pr=document.getElementById('act-print');
  if(pr)pr.onclick=()=>window.print();}

function toast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2600);}

function showExitOverlay(){
  const tr=TIERS.find(t=>t.id==='custom_ext');
  const ov=document.createElement('div');
  ov.className='exit-ov';ov.id='exit-ov';
  ov.innerHTML=`<div class="exit-card" role="dialog" aria-modal="true" aria-labelledby="exit-title">
    <div class="exit-ic">↗</div>
    <div class="exit-eyebrow">Sie verlassen den Entscheidungsbaum</div>
    <h2 id="exit-title">Weiter zum Schnittstellen-Kalkulator</h2>
    <p>Für eine individuelle Schnittstelle ist der detaillierte Kalkulator das richtige Werkzeug. Er erfasst ERP-Profil, Authentifizierung, beliebige Entitäten, Prozesse und Betrieb strukturiert und liefert eine kalibrierbare Aufwandsschätzung.</p>
    <p class="exit-url">${tr.url}</p>
    <div class="exit-nav">
      <button class="btn btn-ghost" id="exit-cancel">Zurück</button>
      <a class="btn btn-primary" id="exit-go" href="${tr.url}" target="_blank" rel="noopener noreferrer">Calculator öffnen ${ARROW}</a>
    </div>
  </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add('show'));
  const close=()=>{ov.classList.remove('show');setTimeout(()=>ov.remove(),220);};
  document.getElementById('exit-cancel').onclick=close;
  ov.onclick=(e)=>{if(e.target===ov)close();};
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});
  // Nach Klick auf "öffnen" das Overlay schließen, der Link öffnet selbst im neuen Tab
  document.getElementById('exit-go').addEventListener('click',()=>setTimeout(close,80));
  document.getElementById('exit-go').focus();}

function addRestart(){const navEl=stage.querySelector('.nav');
  const b=document.createElement('button');b.className='btn btn-primary';b.innerHTML='Neu starten';
  b.onclick=()=>{state={step:0,restCapable:null,fileCapable:null,tier:null,modules:new Set(),persons:'none',migration:null,flags:new Set(),viewMode:'intern'};render();};
  navEl.appendChild(b);}

/* ---------- Permalink & Speichern ---------- */
// state -> kompakter String. Sets werden zu Arrays. step wird auf Ergebnis (8) gesetzt.
function encodeState(){
  const o={r:state.restCapable,f:state.fileCapable,t:state.tier,
    m:[...state.modules],p:state.persons,g:state.migration,x:[...state.flags]};
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/=+$/,'');}catch(e){return '';}}
function decodeState(str){
  try{const o=JSON.parse(decodeURIComponent(escape(atob(str))));
    return {step:8,restCapable:o.r??null,fileCapable:o.f??null,tier:o.t??null,
      modules:new Set(o.m||[]),persons:o.p??'none',migration:o.g??null,flags:new Set(o.x||[])};
  }catch(e){return null;}}
// Baut den Teilen-Link auf Basis der AKTUELLEN Domain (funktioniert unter jeder URL, auch GitHub Pages)
function permalink(){
  const base=window.location.origin+window.location.pathname;
  return base+'?c='+encodeState();}
function restoreFromURL(){
  const params=new URLSearchParams(window.location.search);
  const c=params.get('c');
  if(!c)return false;
  const st=decodeState(c);
  if(!st||st.tier===null)return false;
  state=st;return true;}

const LS_KEY='so_schnittstellen_configs';
function loadSaved(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return [];}}
function saveConfig(name){
  const list=loadSaved();
  list.unshift({name:name||'Ohne Namen',c:encodeState(),ts:Date.now()});
  try{localStorage.setItem(LS_KEY,JSON.stringify(list.slice(0,12)));return true;}catch(e){return false;}}

/* ---------- Start ---------- */
buildPath();
if(restoreFromURL()){render();}else{render();}
</script>
